<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Surprise</title>
    <!-- Elegant font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: #111;
        }

        /* Birthday Surprise Room (Hidden behind the gates initially) */
        .surprise-room {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #2c1a30 0%, #110914 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        .surprise-content {
            color: #fff;
            text-align: center;
            font-size: 2rem;
            font-weight: 200;
            letter-spacing: 4px;
            animation: fadeIn 2s ease-in-out;
        }

        /* Gate Wrapper */
        .gate-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 10;
            overflow: hidden;
        }

        /* Individual Gates */
        .gate {
            width: 50vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            transition: transform 2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .left-gate {
            background-image: url('leftgate.jpg');
            background-position: right center; 
        }

        .right-gate {
            background-image: url('rightgate.jpg');
            background-position: left center;
        }

        /* Sliding classes applied via JS */
        .gate-container.open .left-gate {
            transform: translateX(-100%);
        }

        .gate-container.open .right-gate {
            transform: translateX(100%);
        }

        /* Overlay elements (Text & Lock) */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 80px 20px;
            pointer-events: none; 
            transition: opacity 1s ease;
        }

        .gate-container.open + .ui-layer {
            opacity: 0;
            pointer-events: none;
        }

        /* Typography Header Container */
        .header-container {
            text-align: center;
            max-width: 90%;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Bolder, highly visible Birthday Text */
        .birthday-text {
            color: #ffffff;
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6), 0 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 16px;
        }

        /* Subtext with a bright, high-visibility Yellow Background */
        .birthday-subtext {
            color: #111111; 
            font-size: 1rem;
            font-weight: 700; 
            letter-spacing: 2px;
            text-transform: lowercase;
            background-color: #ffd54f; 
            padding: 8px 24px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            display: inline-block;
        }

        /* Glowing Lock Logo Button - Placed lower */
        .lock-button {
            position: absolute;
            top: 65%; 
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: auto; 
            cursor: pointer;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            padding: 25px;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25), 
                        inset 0 0 15px rgba(255, 255, 255, 0.1);
            transition: all 0.4s ease;
        }

        .lock-button:hover {
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 0 40px rgba(255, 182, 193, 0.9), 
                        inset 0 0 20px rgba(255, 182, 193, 0.4);
            border-color: rgba(255, 182, 193, 0.7);
        }

        .lock-button svg {
            width: 45px;
            height: 45px;
            fill: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            transition: fill 0.4s ease;
        }

        .lock-button:hover svg {
            fill: #ffb6c1; 
            filter: drop-shadow(0 0 12px rgba(255, 182, 193, 1));
        }

        /* Minimalist Prompt Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 30;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            transform: translateY(20px);
            transition: transform 0.5s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
        }

        /* Beautiful Pink Styling for the Prompt Question */
        .modal-content h3 {
            font-weight: 700;
            color: #ec407a; /* Vibrant, upscale rose pink */
            margin-bottom: 20px;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: border 0.3s;
        }

        .modal-content input:focus {
            border-color: #ec407a; /* Input glow matches pink question */
            box-shadow: 0 0 8px rgba(236, 64, 122, 0.2);
        }

        .modal-content button {
            background: #222;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: background 0.3s;
        }

        .modal-content button:hover {
            background: #ec407a;
            color: white;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- 1. The Birthday Surprise Room -->
    <div class="surprise-room">
        <div class="surprise-content" id="surpriseRoom">
            <h2>✨ Welcome to Your Surprise Room ✨</h2>
            <p style="font-size: 1rem; margin-top: 15px; letter-spacing: 2px; color: #aaa;">The gates have parted! Let me know what to put inside next.</p>
        </div>
    </div>

    <!-- 2. The Gates Layer -->
    <div class="gate-container" id="gateContainer">
        <div class="gate left-gate"></div>
        <div class="gate right-gate"></div>
    </div>

    <!-- 3. Foreground UI Layer -->
    <div class="ui-layer">
        <div class="header-container">
            <h1 class="birthday-text">Happy Birthday</h1>
            <div class="birthday-subtext">a lovely birthday present for you !!</div>
        </div>
        
        <div class="lock-button" id="lockBtn" title="Unlock the Gates">
            <svg viewBox="0 0 24 24">
                <path d="M18,8H17V6A5,5,0,0,0,7,6V8H6a3,3,0,0,0,-3,3V21a3,3,0,0,0,3,3H18a3,3,0,0,0,3,-3V11A3,3,0,0,0,18,8ZM9,6a3,3,0,0,1,6,0V8H9ZM12,18a2,2,0,1,1,2,-2A2,2,0,0,1,12,18Z"/>
            </svg>
        </div>
    </div>

    <!-- 4. Interactive Question Modal -->
    <div class="modal" id="quizModal">
        <div class="modal-content">
            <h3>Who is your fav person?</h3>
            <input type="text" id="answerInput" placeholder="Type your answer here..." autocomplete="off">
            <div class="error-msg" id="errorMsg">Hmm, try thinking of who made this... 😉</div>
            <button id="submitBtn">Submit</button>
        </div>
    </div>

    <script>
        const lockBtn = document.getElementById('lockBtn');
        const quizModal = document.getElementById('quizModal');
        const submitBtn = document.getElementById('submitBtn');
        const answerInput = document.getElementById('answerInput');
        const errorMsg = document.getElementById('errorMsg');
        const gateContainer = document.getElementById('gateContainer');

        lockBtn.addEventListener('click', () => {
            quizModal.classList.add('active');
            answerInput.focus();
        });

        quizModal.addEventListener('click', (e) => {
            if (e.target === quizModal) {
                quizModal.classList.remove('active');
                errorMsg.style.display = 'none';
            }
        });

        function checkAnswer() {
            const userAnswer = answerInput.value.trim().toLowerCase();
            
            if (userAnswer === 'you') {
                quizModal.classList.remove('active');
                gateContainer.classList.add('open');
            } else {
                errorMsg.style.display = 'block';
                answerInput.style.borderColor = '#ff4d4d';
            }
        }

        submitBtn.addEventListener('click', checkAnswer);

        answerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
